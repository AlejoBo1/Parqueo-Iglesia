<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Parqueo - Iglesia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header style="display: flex; justify-content: space-between; align-items: center; padding: 0 20px;">
    <h1>Sistema de Parqueo Fijo - Tabernáculo Internacional</h1>
    <div id="user-info" style="background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; font-size: 0.9em;">
        👤 Operador: <span id="nombre-operador-display">...</span>
    </div>
</header>

<!-- Navegación para cambiar entre secciones -->
<nav>
    <button onclick="showSection('ingreso')">Mapa de Ingreso</button>
    <button onclick="showSection('cobros')">Nuevo Registro</button>
    <button onclick="showSection('registro-pagos')">Control de Pagos</button> 
</nav>

<!-- Contenedor principal para las secciones -->
<div class="container">
    <div id="ingreso" class="section active">
        <h2>Mapa de Puestos (1-100)</h2>
        <p>Haz clic en un puesto verde para asignar o en uno rojo para liberar.</p>
        <div id="grid-container" class="grid-parqueo"></div>
    </div>

    <div id="cobros" class="section"> <h2>Registro de Ingreso y Contrato</h2>
        <form id="form-pago">
            <div class="form-group">
                <label for="puesto-num">Número de Puesto Asignado (1-100):</label>
                <input type="number" id="puesto-num" min="1" max="100" required placeholder="Ej: 45">
            </div>
            <div class="form-group">
                <label for="placa-carro">Número de Placa:</label>
                <input type="text" id="placa-carro" placeholder="P-123ABC" required style="text-transform: uppercase;">
            </div>
            <div class="form-group">
                <label for="marca-carro">Marca del Carro:</label>
                <input type="text" id="marca-carro" placeholder="Ej: Toyota, Honda" required style="text-transform: uppercase;">
            </div>
            <div class="form-group">
                <label for="nombre-usuario">Nombre del Propietario:</label>
                <input type="text" id="nombre-usuario" placeholder="Nombre completo" required style="text-transform: uppercase;"> 
            </div>
            <div class="form-group">
                <label for="tipo-contrato">Tipo de Contrato:</label>
                <select id="tipo-contrato">
                    <option value="Quincenal">Quincenal</option>
                    <option value="Mensual">Mensual</option>
                </select>
            </div>
            <button type="submit">Confirmar Ingreso y Guardar</button>
        </form>
    </div>

    <!-- Nueva sección para el control de pagos -->
    <div id="registro-pagos" class="section">
        <h2>💰 Control de Pagos Mensuales/Quincenales</h2>
        <form id="form-registro-pago">

            <div class="form-group">
                <label>Número de Puesto:</label>
                <input type="number" id="pago-puesto-num" min="1" max="100" required>
            </div>

            <div class="form-group">
                <label>Fecha del Pago:</label>
                <input type="date" id="fecha-pago" required>
            </div>

            <!-- Agregado: Selección de periodo a pagar -->
            <div class="form-group">
                <label>Periodo a Pagar:</label>
                <select id="periodo-pago">
                    <option value="1ra Quincena">1ra Quincena</option>
                    <option value="2da Quincena">2da Quincena</option>
                    <option value="Mes Completo">Mes Completo</option>
                </select>
            </div>

            <!-- Agregado: Monto a pagar (puede ser fijo o calculado según el periodo) -->
            <div class="form-group">
                <label for="monto-pago">Monto Recibido ($):</label>
                <input type="number" id="monto-pago" step="0.01" required placeholder="Ej: 25.00">
            </div>

            <button type="submit" class="btn-success">Registrar Pago</button>
        </form>

        <!-- Historial de pagos -->
        <h3>Últimos Pagos Registrados</h3>
        <ul id="lista-historial-pagos"></ul>
    </div>
</div> <script src="script.js"></script>
</body>
</html>
